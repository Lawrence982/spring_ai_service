apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ollama-deployment
  name: ollama-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-deployment
  template:
    metadata:
      labels:
        app: ollama-deployment
    spec:
      containers:
        - image: ollama/ollama:latest
          name: ollama
          command: ["/bin/sh", "-c"]
          args: ["ollama serve & sleep 5 && ollama pull gemma3:4b-it-q4_K_M && ollama pull mxbai-embed-large && wait"]
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-pvc
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: ollama-deployment
  name: ollama-service
spec:
  ports:
    - port: 11434
      protocol: TCP
      targetPort: 11434
  selector:
    app: ollama-deployment
  type: ClusterIP
status:
  loadBalancer: {}