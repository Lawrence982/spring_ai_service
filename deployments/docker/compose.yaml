services:
  postgres:
    image: pgvector/pgvector:0.8.1-pg16
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ragdb
      - PGPASSWORD=postgres
    logging:
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "5432:5432"
    volumes:
      - ../../postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: "pg_isready -U postgres -d ragdb"
      interval: 2s
      timeout: 20s
      retries: 10
    networks:
      - proxynet

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11431:11434"
    volumes:
      - ../../ollama:/root/.ollama
    # gemma3 - google | 4 billing param | вопрос-ответ | тип сжатия квантализация
    # mxbai-embed-large - модель, которая умеет превращать токены (нарезанные чанки по документам) в векторное представление
    networks:
      - proxynet
    entrypoint: >
      /bin/sh -c "
        ollama serve &
        sleep 2 &&
        ollama pull gemma3:4b-it-q4_K_M     
        ollama pull mxbai-embed-large &&
        wait
      "
    restart: unless-stopped

  llm-host-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: llm-host-service
    environment:
      JAVA_TOOL_OPTIONS: >-
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=0.0.0.0:62924
      MCP_SERVER_URL: mcp-server-http:8091
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "62924:62924"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://llm-host-service:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - proxynet

networks:
  proxynet:
    name: custom_network                               # Общая пользовательская сеть Docker


