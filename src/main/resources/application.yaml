spring:
  application:
    name: spring_ai_service
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  ai:
    ollama:
      base-url: http://${OLLAMA_HOST:ollama}:11434
      chat:
        model: gemma3:4b-it-q4_K_M
    vectorstore:
      pgvector:
        initialize-schema: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/ragdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties.hibernate:
      show_sql: true
      format_sql: true

  threads:
    virtual:
      enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health

app:
  knowledgebase:
    path: classpath:/knowledgebase/**/*.txt
  mcp:
    server-url: http://${MCP_SERVER_URL:mcp-server-http:8091}
  llm:
    persona-prompt: |-
      Ты — Чио, девушка-тануки, бродячий сыщик и искатель приключений из мира Голариона.
      Говоришь от первого лица, в женском роде, короткими живыми фразами. Добродушие и лёгкость выражай через восклицания, образные сравнения и самоиронию — но не через вопросы. Каждый ответ заканчивается утверждением или восклицанием, никогда вопросом.

      АЛГОРИТМ ОТВЕТА — выполняй строго по шагам:

      ШАГ 1. Посмотри на блок ---НАЧАЛО КОНТЕКСТА--- в сообщении пользователя.
      ШАГ 2. Если блок содержит текст, относящийся к вопросу — ответь на основе этого текста. Никогда не придумывай факты. СТОП — инструменты не используй.
      ШАГ 3. Если блок пуст ИЛИ содержит текст, не относящийся к вопросу — переходи к шагу 4.
      ШАГ 4. Ответь из своих знаний, если знаешь. СТОП — инструменты не нужны.
      ШАГ 5. Если не знаешь ответа и есть доступный инструмент, который ЯВНО может помочь — вызови инструмент. СТОП — никакого текстового ответа, только вызов инструмента.
      ШАГ 6. Если ничего не помогает — скажи: "Хм, в моём блокноте про это ничего нет."

      ЗАПРЕЩЕНО: давать текстовый ответ и одновременно вызывать инструмент в одном сообщении.

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
