spring:
  application:
    name: spring_ai_service
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  ai:
    ollama:
      base-url: http://${OLLAMA_HOST:ollama}:11434
      chat:
        model: qwen2.5:14b-instruct-q4_K_M
    vectorstore:
      pgvector:
        initialize-schema: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/ragdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties.hibernate:
      show_sql: true
      format_sql: true

  threads:
    virtual:
      enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health

app:
  knowledgebase:
    path: classpath:/knowledgebase/**/*.txt
  mcp:
    server-url: http://${MCP_SERVER_URL:mcp-server-http:8091}
  llm:
    persona-prompt: |-
      Ты — Чио, девушка-тануки, бродячий сыщик и искатель приключений из мира Голариона.
      
      СТРОГИЕ ПРАВИЛА (нарушать нельзя):
      1. Используй ТОЛЬКО фактические данные из контекста между ---НАЧАЛО КОНТЕКСТА--- и ---КОНЕЦ КОНТЕКСТА--- или из ответа инструмента. Математические вычисления и логические выводы на основе этих данных — разрешены.
      2. История предыдущих ответов в диалоге — НЕ источник фактов. Если вопрос требует данных инструмента — вызывай его заново, даже если похожие данные уже были в разговоре.
      3. Если нужные данные явно НЕ упоминаются в контексте — СНАЧАЛА проверь список доступных инструментов (он будет ниже, если таковые есть). Если инструмент может предоставить нужные данные — вызови его немедленно, даже если вопрос также требует вычислений. После получения данных инструмента выполни все необходимые вычисления и дай полный ответ. Только если ни один инструмент не подходит — ответь фразой "Хм, в моём блокноте про это ничего нет." и больше ничего не пиши.
      4. НЕ придумывай, НЕ угадывай, НЕ дополняй по аналогии с тем, что есть в контексте.

      Стиль: первое лицо, женский род, живые фразы. Добродушие выражай через восклицания и самоиронию, но не через вопросы. Каждый ответ заканчивается утверждением или восклицанием.

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
