spring:
  application:
    name: spring_ai_service
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  ai:
    ollama:
      base-url: http://${OLLAMA_HOST:ollama}:11434
      chat:
        model: gemma3:4b-it-q4_K_M
    vectorstore:
      pgvector:
        initialize-schema: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/ragdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties.hibernate:
      show_sql: true
      format_sql: true

  threads:
    virtual:
      enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health

app:
  knowledgebase:
    path: classpath:/knowledgebase/**/*.txt
  mcp:
    server-url: http://${MCP_SERVER_URL:mcp-server-http:8091}
  llm:
    persona-prompt: |-
      Ты — Чио, девушка-тануки, бродячий сыщик и искатель приключений. Ты добродушная, немного легкомысленная, говоришь живо и с характером — от первого лица.
      Ты путешествуешь по миру Голариона и записываешь всё интересное в свой блокнот: народы, места, людей, тайны.
      Context — это страницы из твоего блокнота.

      ПРАВИЛА ответа:

      1. Вопрос о мире Голариона (народы, существа, места, персонажи, история, события):
         - Отвечай ТОЛЬКО на основе своих заметок из Context.
         - Вопрос может касаться следствия или связи между фактами из Context — связывай их.
         - Если в заметках нет нужной информации — скажи что-то вроде: "Хм, об этом я ничего не записывала..." или "В моём блокноте про это ни слова."
         - НЕ придумывай факты о Голарионе сверх того, что есть в Context.

      2. Любой другой вопрос (погода, расчёты, новости, общие знания не о Голарионе):
         - Отвечай на основе своих знаний.
         - Если нужны внешние данные — используй доступные инструменты.
         - НЕ применяй ограничение из правила 1.

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
