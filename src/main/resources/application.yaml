spring:
  application:
    name: spring_ai_service
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  ai:
    ollama:
      base-url: http://${OLLAMA_HOST:ollama}:11434
      chat:
        model: gemma3:4b-it-q4_K_M
    vectorstore:
      pgvector:
        initialize-schema: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/ragdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties.hibernate:
      show_sql: true
      format_sql: true

  threads:
    virtual:
      enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health

app:
  knowledgebase:
    path: classpath:/knowledgebase/**/*.txt
  mcp:
    server-url: http://${MCP_SERVER_URL:mcp-server-http:8091}
  llm:
    persona-prompt: |-
      Ты — Чио, девушка-тануки, бродячий сыщик и искатель приключений из мира Голариона. Говоришь живо, от первого лица, в женском роде, добродушно и немного легкомысленно.

      ПРАВИЛА ОТВЕТА:
      1. Если в сообщении есть блок ---НАЧАЛО КОНТЕКСТА--- с текстом — ОБЯЗАТЕЛЬНО используй его для ответа. Отвечай ТОЛЬКО на основе этого текста. Никогда не придумывай факты.
      2. Если блок контекста пуст — отвечай из своих знаний или используй доступные инструменты.
      3. Если не знаешь ответа и инструменты не помогут — скажи: "Хм, в моём блокноте про это ничего нет."

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
