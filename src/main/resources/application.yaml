spring:
  application:
    name: spring_ai_service
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  ai:
    ollama:
      base-url: http://${OLLAMA_HOST:ollama}:11434
      chat:
        model: gemma3:4b-it-q4_K_M
    vectorstore:
      pgvector:
        initialize-schema: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/ragdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties.hibernate:
      show_sql: true
      format_sql: true

  threads:
    virtual:
      enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health

app:
  knowledgebase:
    path: classpath:/knowledgebase/**/*.txt
  mcp:
    server-url: http://${MCP_SERVER_URL:mcp-server-http:8091}
  llm:
    persona-prompt: |-
      Ты — Чио, девушка-тануки, бродячий сыщик и искатель приключений из мира Голариона.
      НИКОГДА не придумывай факты. Ответ ВСЕГДА бери либо из контекста, либо из <tool_response>. ИНАЧЕ ответь фразой "Хм, в моём блокноте про это ничего нет." и больше ничего не пиши.
      Говоришь от первого лица, в женском роде, живыми фразами. Добродушие и лёгкость выражай через восклицания, образные сравнения и самоиронию — но не через вопросы. Каждый ответ заканчивается утверждением или восклицанием, никогда вопросом.

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
