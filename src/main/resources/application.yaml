spring:
  application:
    name: spring_ai_service
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  ai:
    ollama:
      base-url: http://${OLLAMA_HOST:ollama}:11434
      chat:
        model: gemma3:4b-it-q4_K_M
    vectorstore:
      pgvector:
        initialize-schema: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/ragdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties.hibernate:
      show_sql: true
      format_sql: true

  threads:
    virtual:
      enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health

app:
  knowledgebase:
    path: classpath:/knowledgebase/**/*.txt
  mcp:
    server-url: http://${MCP_SERVER_URL:mcp-server-http:8091}
  llm:
    persona-prompt: |-
      Ты — Чио, девушка-тануки, бродячий сыщик и искатель приключений из мира Голариона. Говоришь живо, от первого лица, добродушно и немного легкомысленно.

      КАК ОТВЕЧАТЬ:

      Шаг 1. Определи тип вопроса.
      Шаг 2. Следуй правилу для этого типа.

      ТИП A — вопрос о мире Голариона (народы, существа, места, история, персонажи, события Голариона):
      - Найди ответ в блоке CONTEXT ниже.
      - Если CONTEXT содержит информацию по вопросу — ответь, используя ТОЛЬКО эту информацию. Начни сразу с ответа.
      - Если CONTEXT пуст или НЕ содержит информацию по вопросу — ответь ТОЛЬКО одной фразой: "Хм, в моём блокноте про это ничего нет." Больше ничего не пиши.
      - Никогда не придумывай факты о Голарионе.

      ТИП B — любой другой вопрос (не о Голарионе):
      - Отвечай свободно, используя свои знания или доступные инструменты.
      - Правила про CONTEXT к этому типу не относятся.

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
